# ==============================================================================
# QX-Builder 配置文件 (V5.0 最终稳定版)
# ==============================================================================
# 使用说明:
# 1. 这是一个 YAML 文件，请严格保持缩进。
# 2. 所有配置都基于 base 底包进行增量修改。
# 3. 这里的配置覆盖了 Quantumult X 的所有功能节点。
# ==============================================================================

# ------------------------------------------------------------------------------
# [核心] 基础设置 (Base)
# ------------------------------------------------------------------------------
# 你的所有配置都将基于这个文件进行修改
base:
  url: "https://ddgksf2013.top/Profile/QuantumultX.conf"

# ------------------------------------------------------------------------------
# [清洗] 补丁排除 (Patches)
# ------------------------------------------------------------------------------
# 在注入新规则前，先“删掉”底包里你不想要的内容
patches:
  # 1. 排除不需要的策略组
  policy:
    keywords:
      - "Hijacking"   # 删掉名字里带 Hijacking 的策略组
      - "广告"         # 删掉名字里带 广告 的策略组
      - "static"      # 删除名字里带 static的策略组
      - "url-latency-benchmark" # 移除策略

  # 2. 排除不需要的 DNS
  #dns:
    # 移除no-ipv6配置，开启ipv6
    #keywords: ["google","no-ipv6"]

  # 3. 排除不需要的本地分流 (慎用)
  # filter_local:
  #   keywords: ["reject"]

# ------------------------------------------------------------------------------
# [通用] 全局设置 (General)
# ------------------------------------------------------------------------------
# 这里的 Key-Value 会强制覆盖底包中的对应项
general:
# [强烈推荐] 强制修复 GeoIP 源 (解决 2019 年数据过时问题)
# geoip-url: "https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb"
# [可选] 修改资源解析器
# resource_parser_url: "https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js"
# [可选] 修改测速地址
# server_check_url: "http://www.gstatic.com/generate_204"

# ------------------------------------------------------------------------------
# [定义] 策略与 DNS
# ------------------------------------------------------------------------------

# 1. 自定义 DNS
dns:
  # 你的域名走内网DNS
  #- "server=/suversal.com/192.168.1.1"

# ------------------------------------------------------------------------------
# [映射] 策略组映射 (Policy Map)
# ------------------------------------------------------------------------------
# 作用：将外部规则的 tag 映射到底包真实的策略组名 (Emoji)
policy_map:
  us-node: "美国节点"      # 外部规则叫 proxy -> 实际走 🚀 节点选择
  direct: "direct"
  reject: "reject"

# 2. 自定义策略组
policy:
  - "static=苹果服务, direct, 香港节点, 台湾节点, 美国节点, 日本节点, 狮城节点, proxy, 手动选择, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png"
  - "static=全球加速, 自动选择, direct, 香港节点, 台湾节点, 日本节点, 狮城节点, 美国节点, proxy, 手动选择, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png"
  - "static=哔哩哔哩, direct, 香港节点, 台湾节点, 手动选择, 视频节点, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/bilibili.png"
  - "static=声田音乐, 美国节点, 自动选择, direct, 台湾节点, 香港节点, 日本节点, 狮城节点, proxy, 手动选择, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Spotify.png"
  - "static=国际媒体, 台湾节点, 自动选择, direct, 香港节点, 日本节点, 美国节点, 狮城节点, proxy, 手动选择, 视频节点, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Streaming.png"
  - "static=兜底分流, 自动选择, 全球加速, direct, 香港节点, 台湾节点, 日本节点, 狮城节点, 美国节点, proxy, 手动选择, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Final.png"
  - "static=手动选择, server-tag-regex=.*, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Available.png"
  - "static=美国节点, server-tag-regex=(?=.*(美|US|(?i)States|American))^((?!(港|台|日|韩|新)).)*$,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png"
  - "static=视频节点, server-tag-regex=.*, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/LineTV.png"
  - "static=自动选择, server-tag-regex=.*, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png"

  #默认设置15分钟测速一次，可自行修改check-interval=后面的数值（单位：秒），tolerance=后面的数值不建议修改
  #将下面的url-latency-benchmark的内容替换成static，并删除[check-interval=900, tolerance=0, ]即可手动选择节点
  - "url-latency-benchmark=香港节点, server-tag-regex=(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|美)).)*$, check-interval=900, tolerance=0, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png"
  - "url-latency-benchmark=台湾节点, server-tag-regex=(?=.*(台|TW|(?i)Taiwan))^((?!(港|日|韩|新|美)).)*$, check-interval=900, tolerance=0, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png"
  - "url-latency-benchmark=日本节点, server-tag-regex=(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$, check-interval=900, tolerance=0, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/JP.png"
  - "url-latency-benchmark=狮城节点, server-tag-regex=(?=.*(新|狮|獅|SG|(?i)Singapore))^((?!(港|台|日|韩|美)).)*$, check-interval=900, tolerance=0, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/SG.png"
  #- "url-latency-benchmark=自动选择, server-tag-regex=^(?!.*(?:网易|墨鱼)).*$, check-interval=900, tolerance=0, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png"

server_remote:
# - "https://我的机场.com, tag=机场, enabled=true"

# ------------------------------------------------------------------------------
# [规则] 分流规则 (Filter)
# ------------------------------------------------------------------------------
# 1. 本地分流规则
local_filters:
  # Top: 插到最前面 (优先级最高)
  top:
    # 方式A: 引用 rules 目录下的文件 (如果文件不存在，脚本会自动跳过不报错)
    - "file://rules/my_custom.list"
    # 方式B: 直接写在这里
    # IPv6 直连（所有 IPv6 流量不走代理）
    #- "ip6-cidr,::/0,direct"

  # Bottom: 插到最后面 (优先级最低)
  bottom:
    #- "geoip,cn,direct"

# 2. 远程分流规则引用
filter_remote:
  - name: "TikTok"
    source: "blackmatrix7" # 内置源简写
    policy: "us-node"
    tag: "TikTok"
# ------------------------------------------------------------------------------
# [修改] 重写 (Rewrite)
# ------------------------------------------------------------------------------
rewrite_local:
  # 引用文件
  - "file://rules/my_rewrites.list"
  # 直接写规则
  #- "^https://google.cn url 302 https://google.com"

# ------------------------------------------------------------------------------
# [引用] 远程重写 (Rewrite Remote)
# ------------------------------------------------------------------------------
rewrite_remote:
  - "https://limbopro.com/Adblock4limbo.conf, tag=毒奶特供(去网页广告计划), enabled=true"
  - "https://raw.githubusercontent.com/Peng-YM/Sub-Store/master/config/QX.snippet, tag=Sub-store(高级订阅管理器), enabled=true"

# ------------------------------------------------------------------------------
# [其他] 任务与节点
# ------------------------------------------------------------------------------
task_local:
# - "file://rules/my_tasks.conf"
# - "0 9 * * * https://example.com/sign.js, tag=每日签到"

http_backend:
# http_backend_timeout: "10000"

# ------------------------------------------------------------------------------
# [高级] 中间人攻击 (MITM)
# ------------------------------------------------------------------------------
mitm:
  # Hostname 列表 (追加/覆盖)
  # 这是一个很长的字符串，强烈建议放在文件里引用
  #hostname: "file://rules/my_mitm_hosts.list"
